name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          timeout: 300s
          script: |
            # Set error handling
            set -euo pipefail
            
            # Navigate to project directory (using ~ for user home)
            cd ~
            
            # Clone or update the repository
            if [ -d "MC-DC-Whitelister" ]; then
              cd MC-DC-Whitelister
              git reset --hard
            else
              git clone https://github.com/muzlik/MC-DC-Whitelister.git
              cd MC-DC-Whitelister
            fi
            
            # Save current state for rollback
            BACKUP_DIR="backup"
            ROLLBACK_FILE="${BACKUP_DIR}/rollback-info"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            
            mkdir -p "${BACKUP_DIR}"
            git status > "${BACKUP_DIR}/git_status_${TIMESTAMP}.txt" 2>&1
            git diff > "${BACKUP_DIR}/git_diff_${TIMESTAMP}.txt" 2>&1
            git rev-parse HEAD > "${BACKUP_DIR}/git_commit_${TIMESTAMP}.txt" 2>&1
            
            echo "$(pwd)" > "${ROLLBACK_FILE}"
            echo "${TIMESTAMP}" >> "${ROLLBACK_FILE}"
            
            # Pull the latest changes
            git reset --hard
            git pull origin main
            
            # Install dependencies
            npm --prefix discord-bot install
            
            # Stop the bot before deployment
            sudo systemctl stop whitelist-bot || pkill -f "node src/index.js" || true
            
            # Deploy changes
            echo "Deployment in progress..."
            
            # Start the bot
            sudo systemctl start whitelist-bot || (
              cd "discord-bot"
              npm start >> ~/deploy.log 2>&1 &
            )
            
            # Wait for bot to start
            sleep 10
            
            # Verify bot is running
            if ! pgrep -f "node src/index.js" > /dev/null; then
              echo "ERROR: Bot failed to start after deployment. Triggering rollback..."
              bash rollback.sh
              exit 1
            fi
            
            # Health checks
            echo "Performing health checks..."
            
            # Check Discord commands deployed
            node discord-bot/src/deploy.js 2>&1 | grep -q "Deploy complete" || {
              echo "ERROR: Discord commands deployment failed. Triggering rollback..."
              bash rollback.sh
              exit 1
            }
            
            echo "Deploy complete - All checks passed"
