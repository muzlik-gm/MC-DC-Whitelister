# WhitelistBot — by muzlik

# Configuration settings
# IMPORTANT: Use environment variables for production: MINECRAFT_API_KEY, MC_HOST, MC_PORT
# For development, configure below (see .env.example for all options)

server:
  host: "127.0.0.1"
  port: 25252

api-key: ""

# Unlink settings
# allow-user-unlink: Whether players can use /wlb unlink
# cooldown: How long after linking before unlink is allowed
#   Options: 10m, 30m, 1h, 6h, 1d, 3d, 1w, 2w, 1mo
unlink:
  allow-user-unlink: true
  cooldown: "1w"

# Anti-alt settings
# enabled: Whether to check for multiple accounts from the same IP
# max-accounts: Maximum whitelisted accounts allowed per IP address
anti-alt:
  enabled: false
  max-accounts: 1

# Role sync settings (requires LuckPerms)
# The Discord bot can map Discord roles to LuckPerms groups
# Configure mappings using /roles in Discord

# Milestone settings
# Playtime milestones in hours that trigger milestone events
milestones:
  - 1
  - 10
  - 50
  - 100
  - 500
  - 1000

# Moderation settings
# Ban, kick, and warn commands are available via Discord
# Warnings are stored in the Discord bot's database

# Tunnel settings (reverse WebSocket connection)
# Set host to the VPS IP/domain to use tunnel mode instead of exposing ports
# The plugin connects outbound to the VPS, bypassing Pterodactyl port restrictions
# Leave host empty to use direct HTTP mode
tunnel:
  # Set host to your VPS IP/domain to use tunnel mode instead of exposing ports
  # The plugin connects outbound to the VPS, bypassing Pterodactyl port restrictions
  # Leave host empty to use direct HTTP mode
  host: "161.118.162.21"
  port: 9000
  # Set to true to use WSS (WebSocket Secure) for encrypted tunnel connections
  # Requires a valid TLS certificate on the VPS tunnel server
  tls: false
